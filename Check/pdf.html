<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ của Thảo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <button onclick="openModal()" class="px-6 py-3 bg-pink-400 hover:bg-pink-500 text-white font-medium rounded-full shadow-lg transition-all transform hover:scale-105">
        Xem Chính Sách
    </button>

    <div id="pdfModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>

        <div class="relative bg-white w-[95vw] max-w-6xl h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-white/20">
    
    <button onclick="closeModal()" class="absolute top-4 right-6 z-[60] text-gray-500 hover:text-pink-500 text-3xl font-light transition-all">
        &times;
    </button>

    <div class="flex-1 w-full">
        <iframe 
            id="pdfFrame"
            src="" 
            class="w-full h-full border-none">
        </iframe>
    </div>
</div>
    </div>

    <script>
        const modal = document.getElementById('pdfModal');
        const iframe = document.getElementById('pdfFrame');
        
        // Link file PDF của bạn (Thêm #pagemode=thumbs để hiện luôn 3 gạch)
        const pdfUrl = "web/viewer.html?file=cnxhkh.pdf#pagemode=thumbs&zoom=page-fit";

        function openModal() {
            modal.classList.remove('hidden'); // Hiện modal
            iframe.src = pdfUrl; // Lúc mở mới bắt đầu load PDF để trang nhẹ hơn
            document.body.style.overflow = 'hidden'; // Khóa cuộn trang web bên dưới
        }

        function closeModal() {
            modal.classList.add('hidden'); // Ẩn modal
            iframe.src = ""; // Xóa link để dừng load
            document.body.style.overflow = 'auto'; // Cho phép cuộn trang lại
        }
    </script>

</body>
</html>
