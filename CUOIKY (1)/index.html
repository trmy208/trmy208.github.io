<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ULTRA PRO 30/4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<video id="eventVideo" src="dragon.mp4" muted></video>
<audio id="bgMusic" src="music.mp3"></audio>

<div id="flash"></div>

<div id="finalScreen">

    <!-- 🇻🇳 FLAG -->
    <div class="flag">
        <svg viewBox="0 0 600 400" width="100%" height="100%">
            
            <!-- gradient -->
            <defs>
                <linearGradient id="grad" x1="0" x2="1">
                    <stop offset="0%" stop-color="#ff4d4d"/>
                    <stop offset="100%" stop-color="#b30000"/>
                </linearGradient>
            </defs>

            <path id="wave" fill="url(#grad)"></path>

            <polygon id="star"
                points="300,150 320,210 380,210 330,250 
                        350,310 300,270 250,310 270,250 
                        220,210 280,210"
                fill="yellow"
            />
        </svg>
    </div>

    <h1 id="title">🇻🇳 30/4 - 1/5 🇻🇳</h1>

    <canvas id="fireworks"></canvas>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
