<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Elysium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --pastel-pink: #ffdae9;
            --pastel-blue: #d1e9ff;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            width: 400px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
        }

        h2 { text-align: center; color: var(--pastel-blue); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--text-gray); font-size: 12px; margin-bottom: 25px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: var(--pastel-pink); margin-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444;
            background: #252525; color: white; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--pastel-blue); background: #2d2d2d; }

        .btn-main {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 15px;
            transition: 0.4s; background: var(--pastel-pink); color: #5c3a4a;
            text-transform: uppercase;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 218, 233, 0.3); }
        .btn-alt { background: var(--pastel-blue); color: #3a4a5c; }

        .divider {
            display: flex; align-items: center; text-align: center; margin: 20px 0;
            color: #555; font-size: 11px; text-transform: uppercase;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        .social-login { display: flex; gap: 12px; }
        .social-btn {
            flex: 1; padding: 11px; border-radius: 10px; border: 1px solid #444;
            background: var(--glass); color: white; cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .social-btn i { font-size: 16px; }
        .social-btn.google i { color: #ea4335; }
        .social-btn:hover { background: #333; border-color: var(--pastel-blue); }

        .toggle-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-gray); }
        .toggle-link span { color: var(--pastel-blue); cursor: pointer; font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- FORM ĐĂNG KÝ -->
        <div id="register-form">
            <h2>Đăng Ký</h2>
            <p class="subtitle">Tham gia hệ thống Elysium</p>
            
            <div class="input-group">
                <label>Họ và Tên</label>
                <input type="text" id="reg-name" placeholder="Họ tên của bạn...">
            </div>
            <div class="input-group">
                <label>Số điện thoại</label>
                <input type="text" id="reg-phone" placeholder="09xx xxx xxx">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="example@gmail.com">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="reg-pass" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="reg-repass" placeholder="••••••••">
            </div>

            <button class="btn-main" id="btn-register-submit">Tạo tài khoản</button>
            
            <div class="divider">Hoặc đăng ký với</div>

            <div class="social-login">
                <button class="social-btn google" id="btn-google">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button class="social-btn" id="btn-github">
                    <i class="fa-brands fa-github"></i> GitHub
                </button>
            </div>

            <div class="toggle-link">
                Đã có tài khoản? <span onclick="toggleAuth()">Đăng nhập</span>
            </div>
        </div>

        <div id="login-form" class="hidden">
            <h2>Đăng Nhập</h2>
            <p class="subtitle">Chào mừng bạn quay trở lại</p>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Nhập email...">
            </div>
            <div class="input-group"> 
                <label>Mật khẩu</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>

            <button class="btn-main btn-alt" id="btn-login-submit">Đăng nhập</button>

            <div class="divider">Hoặc đăng nhập nhanh</div>

            <div class="social-login">
                <button class="social-btn google" id="btn-google-login">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button class="social-btn" id="btn-github-login">
                    <i class="fa-brands fa-github"></i> GitHub
                </button>
            </div>

            <div class="toggle-link">
                Chưa có tài khoản? <span onclick="toggleAuth()">Đăng ký</span>
            </div>
        </div>
    </div>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, GithubAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { firebaseConfig } from './firebase-config.js';
const urlParams = new URLSearchParams(window.location.search);
const redirectTarget = urlParams.get('redirect') || 'index.html'; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.toggleAuth = () => {
        document.getElementById('register-form').classList.toggle('hidden');
        document.getElementById('login-form').classList.toggle('hidden');
    };

    async function saveUserData(uid, name, phone, email) {
        try {
            await set(ref(db, 'users/' + uid), {
                fullName: name || "User",
                phoneNumber: phone || "N/A",
                email: email,
                time: new Date().toLocaleString()
            });

        
            const listUsers = JSON.parse(localStorage.getItem('ticket_users')) || [];
            listUsers.push({ 
                id: uid, 
                name: name, 
                fullName: name, 
                email: email, 
                phone: phone, 
                isReal: true, 
                time: new Date().toLocaleString('vi-VN'),
                createdAt: Date.now()
            });
            localStorage.setItem('ticket_users', JSON.stringify(listUsers));

        } catch (e) { console.error("Lỗi lưu dữ liệu:", e); }
    }

    // 1. XỬ LÝ ĐĂNG KÝ
    document.getElementById('btn-register-submit').onclick = async () => {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;
        const repass = document.getElementById('reg-repass').value;

        if (!name || !email || !pass) return alert("Điền thiếu thông tin kìa!");
        if (pass !== repass) return alert("Mật khẩu xác nhận không khớp!");

        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await saveUserData(res.user.uid, name, phone, email);
            
            alert("Đăng ký thành công! Giờ hãy đăng nhập để tiếp tục.");
            
            if (!document.getElementById('register-form').classList.contains('hidden')) {
                window.toggleAuth();
            }
   
            document.getElementById('login-email').value = email;
            
        } catch (e) { 
            let msg = "Lỗi đăng ký!";
            if(e.code === 'auth/email-already-in-use') msg = "Email này đã được sử dụng rồi!";
            alert(msg); 
        }
    };

    // 2. XỬ LÝ ĐĂNG NHẬP
    document.getElementById('btn-login-submit').onclick = async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        
        if (!email || !pass) return alert("Nhập đủ Email và Mật khẩu nhé!");

        try {
        await signInWithEmailAndPassword(auth, email, pass);
        alert("Đăng nhập thành công!");
  
        window.location.href = redirectTarget; 
    } catch (e) { 
        alert("Sai tài khoản hoặc mật khẩu!"); 
    }
    };

   const loginSocial = async (provider) => {
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const isNewUser = result._tokenResponse?.isNewUser;

        if (isNewUser) {
            await saveUserData(user.uid, user.displayName, "Social", user.email);
            alert("Đăng ký và Đăng nhập thành công!");
        } else {
            alert("Chào mừng bạn quay trở lại!");
        }

        window.location.href = redirectTarget;
    } catch (e) { 
        console.error(e);
        alert("Lỗi đăng nhập mạng xã hội!"); 
    }
};

const mode = urlParams.get('mode'); 
function setInitialForm() {
    const regForm = document.getElementById('register-form');
    const loginForm = document.getElementById('login-form');

    if (mode === 'login') {
        regForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
    } else {
  
        regForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
}

setInitialForm();

    document.getElementById('btn-google').onclick = () => loginSocial(new GoogleAuthProvider());
    document.getElementById('btn-github').onclick = () => loginSocial(new GithubAuthProvider());
    document.getElementById('btn-google-login').onclick = () => loginSocial(new GoogleAuthProvider());
    document.getElementById('btn-github-login').onclick = () => loginSocial(new GithubAuthProvider());

</script>
</body>
</html>
