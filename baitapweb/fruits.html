<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách trái cây phong phú</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h2 { color: #2e7d32; }
        img {
            width: 60px; 
            height: 60px;
            object-fit: cover; 
            vertical-align: middle;
            margin-right: 15px;
            border-radius: 50%; 
            border: 2px solid #eee;
        }
        ul { list-style: none; padding: 0; }
        li {
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        li:hover {
            transform: scale(1.02); 
            background: #f1f8e9;
        }
    </style>
</head>
<body>
    <h2>Các loại trái cây yêu thích của Trà My:</h2>
    <ul>
        <li>
    <img src="tao.jpg" alt="Quả Táo"> Táo (Apple)
</li>
<li>
    <img src="duahau.jpg" alt="Dưa Hấu"> Dưa Hấu (Watermelon)
</li>
<li>
    <img src="chanh.jpg" alt="Quả Chanh"> Chanh (Lemon)
</li>
<li>
    <img src="cam.jpg" alt="Quả Cam"> Cam (Orange)
</li>
<li>
    <img src="chuoi.jpg" alt="Quả Chuối"> Chuối (Banana)
</li>
<li>
    <img src="dautay.jpg" alt="Dâu Tây"> Dâu Tây (Strawberry)
</li>
<li>
    <img src="xoai.jpg" alt="Quả Xoài"> Xoài (Mango)
</li>
    </ul>
</body>
</html>
