<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trà My's To-Do List</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .todo-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h2 {
            color: #d81b60;
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date {
            text-align: center;
            color: #ad1457;
            font-style: italic;
            margin-bottom: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        li:hover {
            transform: scale(1.03);
            background: #ffffff;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #d81b60;
            border-radius: 6px;
            margin-right: 15px;
            cursor: pointer;
            position: relative;
        }

        input[type="checkbox"]:checked {
            background-color: #d81b60;
        }

        input[type="checkbox"]:checked::after {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 14px;
            left: 4px;
            top: -1px;
        }

        input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: #999;
        }

        span {
            font-size: 1.1rem;
            color: #444;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #ad1457;
            border-top: 1px solid rgba(216, 27, 96, 0.2);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>🌸 TET PREPARATION 🧧</h2>
        <p class="date">Friday, February 13th, 2026</p>

        <ul>
            <li>
                <input type="checkbox">
                <span>Go shopping for new clothes 👗</span>
            </li>
            <li>
                <input type="checkbox">
                <span>Go to the hair salon 💇‍♀️</span>
            </li>
            <li>
                <input type="checkbox">
                <span>Get a new nails 💅</span>
            </li>
            <li>
                <input type="checkbox">
                <span>Decorate the house for Tet ✨</span>
